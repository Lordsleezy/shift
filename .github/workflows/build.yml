name: Build Windows Installer

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Build renderer
        run: npm run build:renderer

      - name: Bundle QEMU for Try Demo
        run: npm run fetch:qemu

      - name: Build and publish Windows NSIS installer
        run: npx electron-builder --win nsis --x64 --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release includes latest.yml
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $tag = "v$version"
          if (-not (Test-Path "build/latest.yml")) {
            Write-Error "build/latest.yml was not generated — auto-updater will not work"
            exit 1
          }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Shift by Sentinel v$version" --generate-notes
          }
          gh release upload $tag --clobber build/latest.yml build/*.exe build/*.exe.blockmap
          gh release view $tag --json assets,tagName,isPrerelease | Out-String | Write-Host
          $assets = (gh release view $tag --json assets | ConvertFrom-Json).assets.name
          if ($assets -notcontains "latest.yml") {
            Write-Error "latest.yml is missing from GitHub release $tag"
            exit 1
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shift-by-Sentinel-Windows-NSIS
          path: |
            build/*.exe
            build/*.exe.blockmap
            build/latest.yml
          if-no-files-found: error
